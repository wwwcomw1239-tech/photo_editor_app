name: Flutter Web Preview & Manual APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build Android APK?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-web-preview:
    name: Build & Deploy Web Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - run: flutter config --enable-web
      - run: flutter pub get
      - run: flutter build web --release --base-href "/photo_editor_app/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  build-android-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_apk == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Setup local.properties
        run: |
          FLUTTER_SDK="$(flutter --version --machine | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('flutterRoot',''))" 2>/dev/null || echo "")"
          if [ -z "$FLUTTER_SDK" ]; then
            FLUTTER_SDK="$(dirname $(dirname $(realpath $(which flutter))))"
          fi
          echo "Flutter SDK path: $FLUTTER_SDK"
          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_SDK" "$ANDROID_HOME" > android/local.properties
          cat android/local.properties

      - name: Flutter clean & pub get
        run: |
          flutter clean
          flutter pub get

      - name: Build APK via Gradle directly
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Find and display APK
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "==============================="

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: |
            android/app/build/outputs/apk/release/*.apk
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
          retention-days: 30
