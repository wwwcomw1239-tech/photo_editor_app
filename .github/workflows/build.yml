name: Flutter Web Preview & Manual APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build Android APK?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-web-preview:
    name: Build & Deploy Web Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - run: flutter config --enable-web
      - run: flutter pub get
      - run: flutter build web --release --base-href "/photo_editor_app/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  build-android-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_apk == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Setup local.properties
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK=$(dirname $(dirname $FLUTTER_BIN))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "=== local.properties ==="
          cat android/local.properties

      - name: Flutter clean and pub get
        run: |
          flutter clean
          flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
