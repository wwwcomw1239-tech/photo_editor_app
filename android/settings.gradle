pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
            def path = properties.getProperty("flutter.sdk")
            if (path != null) return path
        }
        // Fallback for CI environments
        def flutterEnv = System.getenv("FLUTTER_ROOT")
        if (flutterEnv != null) return flutterEnv
        
        // Try to find flutter in PATH
        try {
            def proc = "which flutter".execute()
            proc.waitFor()
            if (proc.exitValue() == 0) {
                def flutterPath = proc.text.trim()
                return new File(flutterPath).parentFile.parent
            }
        } catch (Exception e) {
            // Ignore
        }
        
        throw new GradleException("Flutter SDK not found. Define FLUTTER_ROOT or create local.properties")
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
